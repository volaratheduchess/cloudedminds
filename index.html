<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clouded Minds</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Noto Serif SC', serif;
    background: linear-gradient(#8B0000, #B22222);
    color: #FFD700;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 20px;
    position: relative;
  }

  header h1 {
    font-size: 3em;
    margin: 0;
  }

  nav {
    margin-top: 10px;
  }

  nav a {
    color: #FFD700;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
  }

  .hero {
    position: relative;
    text-align: center;
    padding: 100px 20px;
  }

  .hero h2 {
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  .hero p {
    font-size: 1.2em;
    margin-bottom: 20px;
  }

  .hero button {
    background: #FFD700;
    color: #8B0000;
    border: none;
    padding: 15px 30px;
    font-size: 1em;
    cursor: pointer;
    border-radius: 5px;
  }

  .section {
    text-align: center;
    padding: 60px 20px;
  }

  .section h3 {
    font-size: 2em;
    margin-bottom: 15px;
  }

  .cards {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
  }

  .card {
    background: rgba(255, 215, 0, 0.1);
    border: 2px solid #FFD700;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
  }

  .card img {
    width: 100%;
    border-radius: 10px;
  }

  .card button {
    margin-top: 10px;
    background: #FFD700;
    color: #8B0000;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    border-radius: 5px;
  }

  .subscribe {
    text-align: center;
    padding: 50px 20px;
  }

  .subscribe input[type="email"] {
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
    margin-right: 10px;
  }

  .subscribe button {
    background: #FFD700;
    color: #8B0000;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
  }

  /* Decorative clouds and lanterns */
  .cloud, .lantern, .star {
    position: absolute;
  }

  .cloud {
    width: 200px;
    height: 80px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    top: 20%;
    left: 10%;
    filter: blur(5px);
  }

  .cloud:nth-child(2) {
    top: 60%;
    left: 70%;
    width: 250px;
    height: 100px;
  }

  .lantern {
    width: 60px;
    height: 90px;
    background: #FF4500;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    top: 30%;
    left: 80%;
    box-shadow: 0 0 15px 5px rgba(255, 165, 0, 0.7);
  }

  .lantern::after {
    content: '';
    position: absolute;
    width: 4px;
    height: 20px;
    background: #8B0000;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
  }

  .star {
    width: 5px;
    height: 5px;
    background: #FFD700;
    border-radius: 50%;
    top: 15%;
    left: 50%;
  }

  .star:nth-child(2) { top: 40%; left: 20%; }
  .star:nth-child(3) { top: 70%; left: 80%; }
  .star:nth-child(4) { top: 25%; left: 75%; }
</style>
</head>
<body>

<header>
  <h1>Clouded Minds</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Teas</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="hero">
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="lantern"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <h2>Sip, Relax, Unwind</h2>
  <p>Find your peace in every cup.</p>
  <button>Explore Our Teas</button>
</div>

<div class="section">
  <h3>Our Specialties</h3>
  <div class="cards">
    <div class="card">
      <img src="https://via.placeholder.com/250x150?text=Jasmine+Dream" alt="Jasmine Dream">
      <h4>Jasmine Dream</h4>
      <button>Learn More</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/250x150?text=Golden+Oolong" alt="Golden Oolong">
      <h4>Golden Oolong</h4>
      <button>Learn More</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/250x150?text=Red+Lotus+Herbal" alt="Red Lotus Herbal">
      <h4>Red Lotus Herbal</h4>
      <button>Learn More</button>
    </div>
  </div>
</div>

<div class="subscribe">
  <h3>Join the Tea Journey</h3>
  <p>Sign up for updates and special offers</p>
  <input type="email" placeholder="Enter your email">
  <button>Subscribe</button>
</div>

</body>
</html>
